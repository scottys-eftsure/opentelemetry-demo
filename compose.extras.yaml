# Extras layer: override this file in your fork to add or modify services
# for your own observability backend or additional components.
#
# This file is intentionally empty. It is always loaded last, giving forks
# a stable, well-defined seam to customize without touching upstream files.
#
# Usage:
#   docker compose -f compose.yaml -f compose.full.yaml -f compose.observability.yaml -f compose.extras.yaml up
#
# Example: add a service and patch the otel-collector to export to it:
#
# services:
#   my-backend:
#     image: myvendor/backend:latest
#     ports:
#       - "4317"
#
#   otel-collector:
#     depends_on:
#       my-backend:
#         condition: service_started
#
# Then add your exporter config to src/otel-collector/otelcol-config-extras.yml.

# ------------------------------------------------------------------------------
# Memory limit overrides for a dedicated ~64 GB host.
# These raise the demo's laptop-tuned limits to generous guardrails (2x the tuned
# recommendations) so services run without spurious OOM-kills. Limits are kept
# (not removed) so a runaway service can't exhaust the host and so container
# memory-saturation stays a meaningful signal. Total ceiling ~17 GB — comfortable
# on 64 GB, and these are ceilings, not reservations (actual usage is far lower).
# ------------------------------------------------------------------------------
services:
  ad:              { deploy: { resources: { limits: { memory: 1536M } } } }
  cart:            { deploy: { resources: { limits: { memory: 768M } } } }
  checkout:        { deploy: { resources: { limits: { memory: 256M } } } }
  currency:        { deploy: { resources: { limits: { memory: 128M } } } }
  email:           { deploy: { resources: { limits: { memory: 512M } } } }
  frontend:        { deploy: { resources: { limits: { memory: 1G } } } }
  frontend-proxy:  { deploy: { resources: { limits: { memory: 384M } } } }
  image-provider:  { deploy: { resources: { limits: { memory: 512M } } } }
  load-generator:  { deploy: { resources: { limits: { memory: 4G } } } }
  payment:         { deploy: { resources: { limits: { memory: 768M } } } }
  product-catalog: { deploy: { resources: { limits: { memory: 256M } } } }
  product-reviews: { deploy: { resources: { limits: { memory: 512M } } } }
  quote:           { deploy: { resources: { limits: { memory: 256M } } } }
  recommendation:  { deploy: { resources: { limits: { memory: 2G } } } }
  shipping:        { deploy: { resources: { limits: { memory: 128M } } } }
  flagd:           { deploy: { resources: { limits: { memory: 384M } } } }
  flagd-ui:        { deploy: { resources: { limits: { memory: 512M } } } }
  llm:             { deploy: { resources: { limits: { memory: 512M } } } }
  telemetry-docs:  { deploy: { resources: { limits: { memory: 256M } } } }
  astronomy-db:    { deploy: { resources: { limits: { memory: 512M } } } }
  valkey-cart:     { deploy: { resources: { limits: { memory: 256M } } } }
  otel-collector:  { deploy: { resources: { limits: { memory: 2G } } } }
